<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>WhatsApp Custom Clone</title>
    <script src="https://cdn.socket.io/4.7.5/socket.io.min.js"></script>
    <style>
        :root {
            --whatsapp-green: #00a884;
            --whatsapp-bg: #dadbd3;
            --panel-bg: #fff;
            --chat-bg: #efeae2;
            --header-bg: #f0f2f5;
            --text-main: #111b21;
            --text-sub: #667781;
            --bubble-in: #ffffff;
            --bubble-out: #d9fdd3;
            --admin-box-bg: rgba(0, 168, 132, 0.05);
        }

        .dark-theme {
            --whatsapp-green: #00a884;
            --whatsapp-bg: #111b21;
            --panel-bg: #111b21;
            --chat-bg: #0b141a;
            --header-bg: #202c33;
            --text-main: #e9edef;
            --text-sub: #8696a0;
            --bubble-in: #202c33;
            --bubble-out: #005c4b;
            --admin-box-bg: rgba(0, 168, 132, 0.15);
        }

        * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Segoe UI', sans-serif; }
        body { display: flex; width: 100vw; height: 100vh; background-color: var(--whatsapp-bg); overflow: hidden; }

        .chat-loading-screen { position: fixed; top: 0; left: 0; width: 100vw; height: 100vh; background: #111b21; display: none; flex-direction: column; justify-content: center; align-items: center; z-index: 2000; }
        .spinner { width: 50px; height: 50px; border: 4px solid rgba(0, 168, 132, 0.1); border-left-color: var(--whatsapp-green); border-radius: 50%; animation: spin 0.9s linear infinite; margin-bottom: 20px; }
        @keyframes spin { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }
        
        .auth-overlay { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: #222e35; z-index: 3000; display: flex; justify-content: center; align-items: center; }
        .auth-card { background: #111b21; padding: 40px; border-radius: 10px; width: 100%; max-width: 400px; text-align: center; color: #e9edef; }
        .auth-group { display: flex; flex-direction: column; text-align: left; margin-bottom: 15px; }
        .auth-group label { font-size: 12px; color: #00a884; font-weight: bold; margin-bottom: 5px; }
        .auth-group input { padding: 12px; border-radius: 6px; border: none; background: #2a3942; color: #fff; outline: none; width: 100%; }
        .auth-btn { background: #00a884; color: white; border: none; padding: 12px; border-radius: 6px; font-weight: bold; cursor: pointer; width: 100%; margin-top: 10px; }

        .app-container { display: flex; width: 100%; height: 100%; background-color: var(--panel-bg); overflow: hidden; position: relative; }
        .sidebar { width: 30%; min-width: 340px; border-right: 1px solid var(--header-bg); display: flex; flex-direction: column; background: var(--panel-bg); z-index: 10; }
        .sidebar-header { height: 60px; background-color: var(--header-bg); display: flex; align-items: center; padding: 0 16px; justify-content: space-between; flex-shrink: 0; }
        
        .avatar-container { display: flex; align-items: center; gap: 10px; cursor: pointer; }
        .user-avatar { width: 40px; height: 40px; border-radius: 50%; background: #536471; display: flex; align-items: center; justify-content: center; color: white; font-weight: bold; }
        .user-tag { color: var(--text-main); font-weight: bold; }

        .header-controls-group { display: flex; align-items: center; gap: 12px; }
        .control-toggle-btn { background: none; border: none; font-size: 18px; cursor: pointer; color: var(--text-sub); }

        .action-bar { padding: 10px 16px; display: flex; gap: 8px; background: var(--panel-bg); border-bottom: 1px solid var(--header-bg); flex-shrink: 0; }
        .action-bar button { flex: 1; padding: 8px; font-size: 12px; border-radius: 6px; border: 1px solid var(--whatsapp-green); background: transparent; color: var(--whatsapp-green); font-weight: bold; cursor: pointer; }

        .room-section-title { padding: 12px 16px 4px 16px; font-size: 12px; color: var(--whatsapp-green); font-weight: bold; text-transform: uppercase; flex-shrink: 0; }
        .chat-list { flex: 1; overflow-y: auto; }
        .room-item { display: flex; padding: 12px 16px; align-items: center; cursor: pointer; border-bottom: 1px solid rgba(0,0,0,0.02); }
        .room-item:hover, .room-item.active { background-color: var(--header-bg); }
        .room-icon { width: 40px; height: 40px; background: #008069; border-radius: 50%; color: white; display: flex; align-items: center; justify-content: center; font-weight: bold; font-size: 16px; }
        
        .main-chat-panel { width: 70%; display: flex; flex-direction: column; background-color: var(--chat-bg); position: relative; height: 100%; z-index: 5; }
        .chat-header { height: 60px; background-color: var(--header-bg); display: flex; align-items: center; padding: 0 16px; justify-content: space-between; color: var(--text-main); flex-shrink: 0; }
        
        .mobile-back-btn { display: none; background: none; border: none; font-size: 20px; color: var(--whatsapp-green); font-weight: bold; cursor: pointer; margin-right: 10px; }
        .call-actions button { background: var(--whatsapp-green); border: none; color: white; padding: 8px 14px; border-radius: 6px; font-weight: bold; cursor: pointer; margin-left: 8px; }

        .messages-area { flex: 1; overflow-y: auto; padding: 20px 5%; display: flex; flex-direction: column; gap: 8px; }
        .msg { max-width: 65%; padding: 8px 12px; border-radius: 8px; font-size: 14.5px; color: var(--text-main); word-wrap: break-word; }
        .msg-incoming { background-color: var(--bubble-in); align-self: flex-start; border-top-left-radius: 0; }
        .msg-outgoing { background-color: var(--bubble-out); align-self: flex-end; border-top-right-radius: 0; }
        .msg-system { background-color: #ffeecd; align-self: center; text-align: center; border-radius: 5px; font-size: 12px; color: #536471; padding: 4px 10px; }
        
        .conn-error-banner { display: none; background: #ffdada; color: #ff0000; text-align: center; padding: 8px; font-size: 13px; font-weight: bold; border-bottom: 1px solid rgba(255,0,0,0.1); }

        .input-tray { height: 62px; background-color: var(--header-bg); display: flex; align-items: center; padding: 0 16px; gap: 12px; flex-shrink: 0; width: 100%; }
        .text-box { flex: 1; background: var(--panel-bg); border: none; padding: 11px 12px; border-radius: 8px; font-size: 15px; outline: none; color: var(--text-main); }
        .text-box:disabled { background: rgba(0,0,0,0.05); text-align: center; color: var(--text-sub); }

        .settings-panel { position: absolute; top: 0; left: -100%; width: 30%; min-width: 340px; height: 100%; background: var(--panel-bg); z-index: 200; box-shadow: 4px 0 15px rgba(0,0,0,0.15); display: flex; flex-direction: column; transition: left 0.2s ease-in-out; border-right: 1px solid var(--header-bg); }
        .settings-panel.open { left: 0; }
        .settings-header { height: 110px; background: var(--whatsapp-green); color: white; display: flex; align-items: flex-end; padding: 20px; gap: 15px; flex-shrink: 0; }
        .settings-content { padding: 20px; display: flex; flex-direction: column; gap: 25px; color: var(--text-main); overflow-y: auto; flex: 1; }
        .setting-row { display: flex; flex-direction: column; gap: 8px; }
        .setting-row label { font-size: 13px; color: var(--whatsapp-green); font-weight: bold; }
        .setting-row input, .setting-row select { padding: 10px; border-radius: 6px; border: 1px solid var(--text-sub); background: var(--header-bg); color: var(--text-main); outline: none; }

        .admin-dashboard-box { border: 1px solid var(--whatsapp-green); border-radius: 8px; padding: 15px; background: var(--admin-box-bg); margin-top: 10px; display: none; }
        .admin-btn-action { background: #ea4335; color: white; padding: 8px; border: none; border-radius: 4px; font-weight: bold; cursor: pointer; font-size: 12px; margin-top: 5px; margin-right: 5px; }

        @media screen and (max-width: 768px) {
            .sidebar { width: 100%; min-width: 100%; display: flex; }
            .main-chat-panel { position: absolute; top: 0; left: 100%; width: 100%; transition: left 0.25s ease-out; }
            .app-container.mobile-chat-view .main-chat-panel { left: 0; }
            .mobile-back-btn { display: inline-block; }
            .settings-panel { width: 100%; min-width: 100%; }
            .msg { max-width: 85%; }
        }
    </style>
</head>
<body>

<div class="chat-loading-screen" id="chat-messages-loader">
    <div class="spinner"></div>
    <div style="color: #e9edef; font-weight: 500; font-size: 16px;">Synchronizing Chat History Engine...</div>
</div>

<div class="auth-overlay" id="auth-screen">
    <div class="auth-card">
        <h2 id="auth-title" style="margin-bottom:20px;">Log in to WhatsApp</h2>
        <div class="auth-group">
            <label>Username</label>
            <input type="text" id="auth-username" placeholder="Username">
        </div>
        <div class="auth-group">
            <label>Password</label>
            <input type="password" id="auth-password" placeholder="Password">
        </div>
        <button class="auth-btn" id="auth-submit-btn" onclick="executeAuth()">Log In</button>
        <div style="margin-top:20px; font-size:14px; color:#8696a0; cursor:pointer;" id="auth-toggle-msg" onclick="toggleAuthMode()">
            New here? <span style="color:#00a884; font-weight:bold;">Create an account</span>
        </div>
    </div>
</div>

<div class="app-container" id="app-viewport">
    <div class="settings-panel" id="settings-drawer">
        <div class="settings-header">
            <button style="background:none; border:none; color:white; font-size:22px; cursor:pointer;" onclick="toggleSettings(false)">←</button>
            <h2>Settings Center</h2>
        </div>
        <div class="settings-content">
            <div class="setting-row">
                <label>Profile Picture URL</label>
                <input type="text" id="avatar-url-input" placeholder="Paste image web link" onchange="updateProfilePicture()">
            </div>
            <div class="setting-row">
                <label>Chat Background Wallpaper</label>
                <select id="chat-bg-select" onchange="changeChatWallpaper()">
                    <option value="#efeae2">Classic Sand Beige</option>
                    <option value="#748c7a">Sage Garden Green</option>
                    <option value="#2b4c5e">Deep Ocean Blue</option>
                    <option value="#1c1c1e">Solid Charcoal Dark</option>
                </select>
            </div>
            <div class="setting-row" style="flex-direction: row; justify-content: space-between; align-items: center;">
                <label style="font-size: 15px;">Enable Dark Mode</label>
                <input type="checkbox" id="dark-mode-toggle" style="width:20px; height:20px;" onchange="toggleDarkTheme()">
            </div>

            <div class="admin-dashboard-box" id="admin-panel-ui">
                <h4 style="color:var(--whatsapp-green); margin-bottom:8px;">🛡️ Moderation Operations</h4>
                <div class="setting-row">
                    <label>Target User Name</label>
                    <input type="text" id="admin-target-user" placeholder="Enter exact username">
                </div>
                <div style="margin-top: 5px;">
                    <button class="admin-btn-action" onclick="submitAdminTask('ban')">🔨 Ban</button>
                    <button class="admin-btn-action" style="background:#4285f4;" onclick="submitAdminTask('unban')">Unban</button>
                    <span id="owner-only-buttons">
                        <button class="admin-btn-action" style="background:#34a853;" onclick="submitAdminTask('promote')">⭐ Make Admin</button>
                    </span>
                </div>
            </div>
        </div>
    </div>

    <div class="sidebar">
        <div class="sidebar-header">
            <div class="avatar-container" onclick="toggleSettings(true)">
                <div class="user-avatar" id="profile-avatar-view">?</div>
                <div id="username-display" class="user-tag">User</div>
            </div>
            <div class="header-controls-group">
                <button class="control-toggle-btn" id="mute-mic-btn" onclick="toggleMuteMic()">🎙️</button>
                <button class="control-toggle-btn" id="sleep-deafen-btn" onclick="toggleSleepDeafen()">🎧</button>
                <button class="control-toggle-btn" onclick="toggleSettings(true)">⚙️</button>
            </div>
        </div>
        <div class="action-bar">
            <button onclick="createNewGroup()">➕ New Group</button>
            <button onclick="startPrivateChat()">👤 Private Chat</button>
        </div>
        <div class="room-section-title">Conversations</div>
        <div class="chat-list" id="chat-sidebar-list"></div>
    </div>

    <div class="main-chat-panel" id="chat-panel-surface">
        <div class="chat-header">
            <div style="display: flex; align-items: center;">
                <button class="mobile-back-btn" onclick="exitMobileChatView()">←</button>
                <div>
                    <h3 id="current-chat-title">WhatsApp Updates</h3>
                    <span style="font-size:12px; color: var(--text-sub);" id="chat-subtitle">Official Channel</span>
                </div>
            </div>
            <div class="call-actions" id="header-call-buttons">
                <button onclick="initiateCallOutbound(false)">📞 Voice</button>
                <button onclick="initiateCallOutbound(true)">📹 Video</button>
            </div>
        </div>

        <div class="conn-error-banner" id="error-banner">Connection dropped. Retrying sync with local server...</div>

        <div class="messages-area" id="msg-stream"></div>

        <div class="input-tray">
            <input type="text" class="text-box" id="input-payload" placeholder="Type a message" onkeypress="handleKey(event)">
            <button style="background:none; border:none; color: var(--whatsapp-green); font-weight:bold; cursor:pointer;" onclick="dispatchMessage()">Send</button>
        </div>
    </div>
</div>

<script>
    let socket;
    let myName = "";
    let myRole = "user"; 
    let isLoginMode = true;
    let activeRoom = "WhatsApp Updates";
    let isMuted = false;
    let isDeafened = false;

    let roomList = ["WhatsApp Updates", "Global Lounge"];
    let chatMemory = { "WhatsApp Updates": [], "Global Lounge": [] };

    // Spin up Socket Engine immediately on startup
    bootSocketSync();

    function toggleMuteMic() { isMuted = !isMuted; document.getElementById('mute-mic-btn').innerText = isMuted ? "🔇" : "🎙️"; }
    function toggleSleepDeafen() { isDeafened = !isDeafened; document.getElementById('sleep-deafen-btn').innerText = isDeafened ? "💤" : "🎧"; }
    function toggleAuthMode() {
        isLoginMode = !isLoginMode;
        document.getElementById('auth-title').innerText = isLoginMode ? "Log in to WhatsApp" : "Create an Account";
        document.getElementById('auth-submit-btn').innerText = isLoginMode ? "Log In" : "Register Account";
    }

    function executeAuth() {
        const usernameInput = document.getElementById('auth-username').value.trim();
        const passwordInput = document.getElementById('auth-password').value;
        if(!usernameInput || !passwordInput) return alert("Fill fields!");

        if (!socket || !socket.connected) {
            return alert("Still connecting to network pipeline. Please wait 2 seconds.");
        }

        // Fire request directly over the established secure socket pipeline
        const eventName = isLoginMode ? 'request-login' : 'request-register';
        socket.emit(eventName, { username: usernameInput, password: passwordInput });
    }

    function bootSocketSync() {
        socket = io({
            reconnection: true,
            reconnectionAttempts: Infinity,
            reconnectionDelay: 1000
        });

        socket.on('connect', () => {
            document.getElementById('error-banner').style.display = 'none';
            if (myName) {
                socket.emit('new-user', myName);
                socket.emit('join-room', activeRoom);
            }
        });

        socket.on('disconnect', () => {
            document.getElementById('error-banner').style.display = 'block';
        });

        // Safe socket answer gateway
        socket.on('auth-response', data => {
            if (data.success) {
                if (data.isRegister) {
                    alert("Registered successfully! Logging in...");
                    toggleAuthMode();
                } else {
                    myName = data.username;
                    myRole = data.role;
                    roomList = data.rooms || roomList;

                    document.getElementById('auth-screen').style.display = 'none';
                    document.getElementById('chat-messages-loader').style.display = 'flex';

                    document.getElementById('username-display').innerText = myName;
                    document.getElementById('profile-avatar-view').innerText = myName[0].toUpperCase();
                    
                    applyUIVisibilityRules();
                    socket.emit('new-user', myName);
                    
                    switchChatTab("WhatsApp Updates");
                }
            } else {
                alert(data.message);
            }
        });

        socket.on('sync-all-rooms', rooms => {
            roomList = rooms;
            renderSidebarTabs();
        });

        socket.on('sync-room-history', data => {
            chatMemory[data.room] = data.history;
            if(activeRoom === data.room) renderActiveMessages();
            renderSidebarTabs();
            document.getElementById('chat-messages-loader').style.display = 'none';
        });

        socket.on('chat-message', data => {
            if(!chatMemory[data.room]) chatMemory[data.room] = [];
            chatMemory[data.room].push({ type: 'msg', sender: data.name, text: data.message });
            if(activeRoom === data.room) renderActiveMessages();
            renderSidebarTabs();
        });

        socket.on('system-message', data => {
            if(!chatMemory[data.room]) chatMemory[data.room] = [];
            chatMemory[data.room].push({ type: 'system', text: data.text });
            if(activeRoom === data.room) renderActiveMessages();
        });

        socket.on('force-role-sync', data => {
            if (myName.toLowerCase().trim() === data.username.toLowerCase().trim()) {
                myRole = data.newRole; applyUIVisibilityRules(); switchChatTab(activeRoom);
            }
        });

        socket.on('force-kick', data => {
            if (myName.toLowerCase().trim() === data.username.toLowerCase().trim()) {
                alert("🚨 Kicked."); window.location.reload(); 
            }
        });
    }

    function renderSidebarTabs() {
        const container = document.getElementById('chat-sidebar-list');
        container.innerHTML = "";
        roomList.forEach(room => {
            const el = document.createElement('div');
            el.className = `room-item ${room === activeRoom ? 'active' : ''}`;
            el.onclick = () => { 
                switchChatTab(room);
                if(window.innerWidth <= 768) document.getElementById('app-viewport').classList.add('mobile-chat-view');
            };
            const badgeColor = room === "WhatsApp Updates" ? "#00a884" : "#536471";
            el.innerHTML = `
                <div class="room-icon" style="background:${badgeColor}">${room[0].toUpperCase()}</div>
                <div style="margin-left:12px;"><div style="font-weight:500; color:var(--text-main);">${room}</div></div>
            `;
            container.appendChild(el);
        });
    }

    function exitMobileChatView() { document.getElementById('app-viewport').classList.remove('mobile-chat-view'); }
    function applyUIVisibilityRules() {
        const cleanRole = String(myRole).toLowerCase().trim();
        if (cleanRole === 'admin') {
            document.getElementById('admin-panel-ui').style.display = 'block';
            document.getElementById('owner-only-buttons').style.display = (myName.toLowerCase().trim() === "shashankm") ? 'inline' : 'none';
        } else {
            document.getElementById('admin-panel-ui').style.display = 'none';
        }
    }

    function switchChatTab(targetRoom) {
        activeRoom = targetRoom;
        document.getElementById('current-chat-title').innerText = targetRoom;
        document.getElementById('chat-messages-loader').style.display = 'flex';

        if (socket && socket.connected) {
            socket.emit('join-room', targetRoom);
        } else {
            renderActiveMessages();
            renderSidebarTabs();
            document.getElementById('chat-messages-loader').style.display = 'none';
        }

        const textInput = document.getElementById('input-payload');
        const cleanRole = String(myRole).toLowerCase().trim();

        if(targetRoom === "WhatsApp Updates") {
            textInput.disabled = (cleanRole !== "admin");
            textInput.placeholder = (cleanRole === "admin") ? "Post an update..." : "🔒 Only admins can send messages";
            document.getElementById('chat-subtitle').innerText = "System Channel";
        } else {
            textInput.disabled = false;
            textInput.placeholder = "Type a message";
            document.getElementById('chat-subtitle').innerText = "Active Chat";
        }
    }

    function createNewGroup() {
        const name = prompt("Enter Group Name:");
        if(!name || !name.trim()) return;
        if (socket && socket.connected) { socket.emit('create-new-room', name.trim()); switchChatTab(name.trim()); }
    }

    function startPrivateChat() {
        const peer = prompt("Enter username:");
        if(!peer || !peer.trim()) return;
        const target = `DM: ${peer.trim()}`;
        if (socket && socket.connected) { socket.emit('create-new-room', target); switchChatTab(target); }
    }

    function renderActiveMessages() {
        const stream = document.getElementById('msg-stream');
        stream.innerHTML = "";
        (chatMemory[activeRoom] || []).forEach(item => {
            const el = document.createElement('div');
            if(item.type === 'system') {
                el.className = 'msg msg-system'; el.innerText = item.text;
            } else {
                el.className = item.sender === myName ? 'msg msg-outgoing' : 'msg msg-incoming';
                el.innerHTML = `<b>${item.sender}</b><br>${item.text}`;
            }
            stream.appendChild(el);
        });
        stream.scrollTop = stream.scrollHeight;
    }

    function dispatchMessage() {
        const input = document.getElementById('input-payload');
        const txt = input.value.trim();
        if(!txt) return;

        if(socket && socket.connected) {
            socket.emit('send-chat-message', { room: activeRoom, message: txt });
            input.value = '';
        } else {
            document.getElementById('error-banner').style.display = 'block';
        }
    }

    function submitAdminTask(actionType) {
        const target = document.getElementById('admin-target-user').value.trim();
        if(!target || !socket) return;
        socket.emit('admin-action', { action: actionType, targetUser: target });
        document.getElementById('admin-target-user').value = '';
    }

    function toggleSettings(openState) { document.getElementById('settings-drawer').classList.toggle('open', openState); }
    function updateProfilePicture() {
        const url = document.getElementById('avatar-url-input').value.trim();
        if(url) document.getElementById('profile-avatar-view').innerHTML = `<img src="${url}" style="width:100%;height:100%;border-radius:50%;object-fit:cover;">`;
    }
    function changeChatWallpaper() { document.getElementById('chat-panel-surface').style.backgroundColor = document.getElementById('chat-bg-select').value; }
    function toggleDarkTheme() {
        const isChecked = document.getElementById('dark-mode-toggle').checked;
        document.body.classList.toggle('dark-theme', isChecked);
        localStorage.setItem('whatsapp_dark_mode', isChecked);
    }
    if (localStorage.getItem('whatsapp_dark_mode') === 'true') {
        document.getElementById('dark-mode-toggle').checked = true;
        document.body.classList.add('dark-theme');
    }
    function handleKey(e) { if(e.key === 'Enter') dispatchMessage(); }
</script>
</body>
</html>
