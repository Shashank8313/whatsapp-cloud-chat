<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>WhatsApp Web Clone</title>
    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; }
        body { display: flex; height: 100vh; background-color: #f0f2f5; color: #111b21; }
        
        /* Auth Screen */
        #auth-container { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: #00a884; display: flex; justify-content: center; align-items: center; z-index: 1000; }
        .auth-box { background: white; padding: 30px; border-radius: 8px; box-shadow: 0 4px 10px rgba(0,0,0,0.1); width: 350px; text-align: center; }
        .auth-box h2 { margin-bottom: 20px; color: #008069; }
        .auth-box input { width: 100%; padding: 12px; margin: 10px 0; border: 1px solid #ccc; border-radius: 6px; font-size: 16px; }
        .auth-box button { width: 100%; padding: 12px; background: #00a884; border: none; color: white; border-radius: 6px; cursor: pointer; font-size: 16px; font-weight: bold; margin-top: 10px; }
        .auth-box button:hover { background: #008069; }
        .auth-box .toggle-link { margin-top: 15px; display: block; color: #008069; cursor: pointer; font-size: 14px; }

        /* Main Layout */
        #sidebar { width: 35%; max-width: 400px; min-width: 280px; background: #white; border-right: 1px solid #e9edef; display: flex; flex-direction: column; }
        #chat-area { flex: 1; display: flex; flex-direction: column; background: #efeae2; position: relative; }

        /* Header Layouts */
        .header { height: 60px; background: #f0f2f5; display: flex; align-items: center; justify-content: space-between; padding: 0 16px; border-bottom: 1px solid #e9edef; }
        .user-profile { display: flex; align-items: center; gap: 10px; }
        .avatar { width: 40px; height: 40px; border-radius: 50%; background: #dfe5e7; display: flex; align-items: center; justify-content: center; font-weight: bold; color: #54656f; overflow: hidden; object-fit: cover; }
        
        /* Rooms list styling */
        .search-bar-box { padding: 8px; background: #white; border-bottom: 1px solid #e9edef; }
        .search-bar-box input { width: 100%; padding: 8px; border: none; background: #f0f2f5; border-radius: 8px; outline: none; }
        #room-list { flex: 1; overflow-y: auto; background: white; }
        .room-item { display: flex; align-items: center; padding: 12px 16px; cursor: pointer; border-bottom: 1px solid #f0f2f5; gap: 12px; }
        .room-item:hover { background-color: #f5f6f6; }
        .room-item.active { background-color: #eaebeb; }
        .room-details { flex: 1; }
        .room-title-row { display: flex; justify-content: space-between; }
        .room-name-text { font-weight: 500; font-size: 16px; }

        /* Messages Space */
        #messages-container { flex: 1; overflow-y: auto; padding: 20px; display: flex; flex-direction: column; gap: 8px; }
        .msg-line { display: flex; flex-direction: column; max-width: 65%; padding: 8px 12px; border-radius: 8px; font-size: 14.5px; position: relative; box-shadow: 0 1px 0.5px rgba(0,0,0,0.1); }
        .msg-line.incoming { background: white; align-self: flex-start; border-top-left-radius: 0; }
        .msg-line.outgoing { background: #d9fdd3; align-self: flex-end; border-top-right-radius: 0; }
        .msg-line.system-msg { background: #f0f2f5; align-self: center; text-align: center; max-width: 90%; color: #54656f; font-size: 12px; box-shadow: none; border-radius: 6px; }
        .msg-sender { font-size: 12.5px; font-weight: 600; color: #008069; margin-bottom: 2px; }

        /* Footer Input Area */
        #input-panel { height: 62px; background: #f0f2f5; display: flex; align-items: center; padding: 5px 10px; gap: 10px; }
        #message-input { flex: 1; padding: 12px; border: none; border-radius: 8px; outline: none; font-size: 15px; }
        #send-btn { background: transparent; border: none; font-size: 24px; cursor: pointer; color: #54656f; padding: 0 10px; }

        /* Admin Controls */
        .admin-section { padding: 10px 16px; background: #f0f2f5; border-bottom: 1px solid #e9edef; display: flex; gap: 8px; }
        .admin-input { flex: 1; padding: 6px; border: 1px solid #ccc; border-radius: 4px; outline: none; }
        .admin-btn { padding: 6px 12px; background: #00a884; border: none; color: white; border-radius: 4px; cursor: pointer; font-weight: bold; }
        .hidden { display: none !important; }
    </style>
</head>
<body>

    <div id="auth-container">
        <div class="auth-box" id="login-form-view">
            <h2>WhatsApp Login</h2>
            <input type="text" id="login-username" placeholder="Enter Username...">
            <input type="password" id="login-password" placeholder="Enter Password...">
            <button onclick="submitLogin()">Log In</button>
            <span class="toggle-link" onclick="toggleAuthViews(true)">Don't have an account? Register</span>
        </div>
        <div class="auth-box hidden" id="register-form-view">
            <h2>Create Account</h2>
            <input type="text" id="register-username" placeholder="Choose Username...">
            <input type="password" id="register-password" placeholder="Choose Password...">
            <button onclick="submitRegister()">Register</button>
            <span class="toggle-link" onclick="toggleAuthViews(false)">Already have an account? Login</span>
        </div>
    </div>

    <div id="sidebar">
        <div class="header">
            <div class="user-profile">
                <div class="avatar" id="my-avatar-logo">U</div>
                <b id="my-display-name">Username</b>
            </div>
            <span style="color:#54656f; font-size:20px; cursor:pointer;" onclick="location.reload()">Logout</span>
        </div>

        <div class="admin-section hidden" id="admin-panel">
            <input type="text" id="new-room-input" class="admin-input" placeholder="Create Chat Room Name...">
            <button class="admin-btn" onclick="createNewRoom()">Add</button>
        </div>

        <div class="search-bar-box">
            <input type="text" placeholder="Search or start new chat">
        </div>

        <div id="room-list">
            </div>
    </div>

    <div id="chat-area">
        <div class="header">
            <div class="user-profile">
                <img id="active-room-avatar" class="avatar" src="" style="display:none;">
                <div id="active-room-avatar-placeholder" class="avatar">#</div>
                <div>
                    <h3 id="active-room-title">Select a room to begin</h3>
                </div>
            </div>
            <div class="admin-section hidden" id="pfp-management-panel" style="background:transparent; border:none; padding:0;">
                <input type="text" id="room-pfp-url-input" class="admin-input" placeholder="Paste Room Image URL..." style="width:160px; height:32px; font-size:12px;">
                <button class="admin-btn" style="height:32px; font-size:12px;" onclick="updateRoomPFP()">Set PFP</button>
            </div>
        </div>

        <div id="messages-container">
            </div>

        <div id="input-panel">
            <input type="text" id="message-input" placeholder="Type a message" disabled>
            <button id="send-btn" onclick="sendMessage()" disabled>➔</button>
        </div>
    </div>

    <script src="/socket.io/socket.io.js"></script>
    <script>
        // 🚀 CONNECTING LIVE 24/7 TO YOUR NEW RENDER PRODUCTION PATHWAY
        const socket = io("https://shashank-chat.onrender.com");

        let currentUsername = "";
        let currentUserRole = "user";
        let currentRoom = "";
        let globalRoomsMetadata = {};

        // Authentication Toggle Views
        function toggleAuthViews(showRegister) {
            document.getElementById('login-form-view').classList.toggle('hidden', showRegister);
            document.getElementById('register-form-view').classList.toggle('hidden', !showRegister);
        }

        // Authentication Actions
        function submitLogin() {
            const user = document.getElementById('login-username').value;
            const pass = document.getElementById('login-password').value;
            if(!user || !pass) return alert("Please fill out all login fields!");
            socket.emit('request-login', { username: user, password: pass });
        }

        function submitRegister() {
            const user = document.getElementById('register-username').value;
            const pass = document.getElementById('register-password').value;
            if(!user || !pass) return alert("Please enter registration parameters.");
            socket.emit('request-register', { username: user, password: pass });
        }

        // Server Auth Response
        socket.on('auth-response', (data) => {
            if (!data.success) {
                return alert(data.message || "Authentication rejected!");
            }

            if (data.isRegister) {
                alert("Account created successfully! You can now log in.");
                toggleAuthViews(false);
                return;
            }

            // Successfully Logged In
            currentUsername = data.username;
            currentUserRole = data.role;
            
            document.getElementById('my-display-name').innerText = currentUsername;
            document.getElementById('my-avatar-logo').innerText = currentUsername.charAt(0).toUpperCase();
            document.getElementById('auth-container').style.display = 'none';

            // Show admin panel options if authorized account
            if (currentUserRole === 'admin') {
                document.getElementById('admin-panel').classList.remove('hidden');
            }

            socket.emit('new-user', currentUsername);
            renderRoomListLayout(data.roomsData);
        });

        // Build Sidebar Chat Rooms Interface Lists
        function renderRoomListLayout(roomsData) {
            globalRoomsMetadata = roomsData;
            const container = document.getElementById('room-list');
            container.innerHTML = "";

            Object.keys(roomsData).forEach(roomName => {
                const metadata = roomsData[roomName];
                const item = document.createElement('div');
                item.className = `room-item ${currentRoom === roomName ? 'active' : ''}`;
                item.onclick = () => switchActiveRoom(roomName);

                // Setup Room Icons
                let avatarHTML = `<div class="avatar">#</div>`;
                if(metadata.pfp && metadata.pfp.trim() !== "") {
                    avatarHTML = `<img class="avatar" src="${metadata.pfp}" object-fit="cover">`;
                }

                item.innerHTML = `
                    ${avatarHTML}
                    <div class="room-details">
                        <div class="room-title-row">
                            <span class="room-name-text">${roomName}</span>
                        </div>
                    </div>
                `;
                container.appendChild(item);
            });
        }

        // Room switching actions
        function switchActiveRoom(roomName) {
            if(roomName === currentRoom) return;
            currentRoom = roomName;

            document.getElementById('active-room-title').innerText = currentRoom;
            
            // Check for Custom Room Profile Images
            const activePFP = globalRoomsMetadata[currentRoom]?.pfp || "";
            const imgTag = document.getElementById('active-room-avatar');
            const placeholderTag = document.getElementById('active-room-avatar-placeholder');

            if(activePFP && activePFP.trim() !== "") {
                imgTag.src = activePFP;
                imgTag.style.display = "block";
                placeholderTag.style.display = "none";
            } else {
                imgTag.style.display = "none";
                placeholderTag.style.display = "flex";
            }

            // Setup input locking parameters
            const isUpdatesRoom = (currentRoom === "WhatsApp Updates");
            const canChat = !isUpdatesRoom || (currentUserRole === 'admin');

            document.getElementById('message-input').disabled = !canChat;
            document.getElementById('send-btn').disabled = !canChat;
            document.getElementById('message-input').placeholder = canChat ? "Type a message" : "🔒 Only Admins can broadcast messages here.";

            // Toggle admin PFP editor utility tools
            if(currentUserRole === 'admin') {
                document.getElementById('pfp-management-panel').classList.remove('hidden');
                document.getElementById('room-pfp-url-input').value = activePFP;
            } else {
                document.getElementById('pfp-management-panel').classList.add('hidden');
            }

            document.getElementById('messages-container').innerHTML = "";
            socket.emit('join-room', currentRoom);
            renderRoomListLayout(globalRoomsMetadata);
        }

        // Message transmissions
        function sendMessage() {
            const input = document.getElementById('message-input');
            const msg = input.value.trim();
            if(!msg || !currentRoom) return;

            socket.emit('send-chat-message', { room: currentRoom, message: msg });
            input.value = "";
        }

        document.getElementById('message-input').addEventListener('keypress', (e) => {
            if(e.key === 'Enter') sendMessage();
        });

        // Appending text outputs smoothly
        function displayMessageLine(data) {
            const container = document.getElementById('messages-container');
            const div = document.createElement('div');

            if(data.type === 'system') {
                div.className = "msg-line system-msg";
                div.innerText = data.text;
            } else {
                const isMe = (data.sender === currentUsername);
                div.className = `msg-line ${isMe ? 'outgoing' : 'incoming'}`;
                
                div.innerHTML = `
                    ${!isMe ? `<div class="msg-sender">${data.sender}</div>` : ''}
                    <div class="msg-text">${data.text}</div>
                `;
            }

            container.appendChild(div);
            container.scrollTop = container.scrollHeight;
        }

        // System Network Synchronization Listeners
        socket.on('sync-room-history', (data) => {
            if(data.room !== currentRoom) return;
            document.getElementById('messages-container').innerHTML = "";
            data.history.forEach(msg => {
                displayMessageLine({
                    type: msg.type,
                    sender: msg.sender,
                    text: msg.text
                });
            });
        });

        socket.on('chat-message', (data) => {
            if(data.room === currentRoom) {
                displayMessageLine({ type: 'msg', sender: data.name, text: data.message });
            }
        });

        socket.on('system-message', (data) => {
            if(data.room === currentRoom) {
                displayMessageLine({ type: 'system', text: data.text });
            }
        });

        socket.on('sync-all-rooms', (roomsData) => {
            renderRoomListLayout(roomsData);
        });

        // Custom Admin Utility Triggers
        function createNewRoom() {
            const input = document.getElementById('new-room-input');
            const targetName = input.value.trim();
            if(!targetName) return alert("Room title cannot be blank.");

            socket.emit('create-new-room', targetName);
            input.value = "";
        }

        function updateRoomPFP() {
            const urlInput = document.getElementById('room-pfp-url-input').value.trim();
            if(!currentRoom) return alert("Select an active group channel target first.");
            socket.emit('update-room-pfp', { room: currentRoom, pfpUrl: urlInput });
        }
    </script>
</body>
</html>
